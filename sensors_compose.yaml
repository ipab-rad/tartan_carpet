services:

  av_bms:
    image: "ghcr.io/ipab-rad/av_bms:1.0.0"
    container_name: av_bms
    network_mode: "host"
    privileged: true
    volumes:
      - "/dev:/dev"
      - "/tmp:/tmp"
      - "/etc/localtime:/etc/localtime:ro"

  av_camera:
    image: "ghcr.io/ipab-rad/av_camera:4.0.0"
